<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading...</title>
  
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080a0c;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bg {
      position: fixed;
      inset: 0;
      /* Fetching the background image directly from your metaforge repo */
      background: url('https://raw.githubusercontent.com/Jordybeer/metaforge/main/generated-image.png') center center / cover no-repeat;
      background-color: #080a0c; 
      z-index: 0;
    }
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(8,10,12,0.75) 0%,
        rgba(8,10,12,0.45) 40%,
        rgba(8,10,12,0.80) 100%
      );
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      transition: opacity 0.5s ease-out;
    }

    lottie-player {
      width: min(50vw, 300px);
      height: min(50vw, 300px);
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <canvas id="particles"></canvas>

  <div class="content" id="loader-content">
    <lottie-player 
      src="https://lottie.host/808b8b0e-660c-40ab-96f3-a18542bb1278/XvX95b0MFi.json" 
      background="transparent" 
      speed="1" 
      loop 
      autoplay>
    </lottie-player>
  </div>

  <script>
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    for (let i = 0; i < 55; i++) {
      particles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.4 + 0.3,
        vx: (Math.random() - 0.5) * 0.22,
        vy: -(Math.random() * 0.35 + 0.05),
        a: Math.random() * 0.5 + 0.1
      });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.y < -4) { p.y = H + 4; p.x = Math.random() * W; }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(232,160,80,${p.a})`;
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    draw();

    // Fade out Lottie after 2 seconds, then redirect 500ms later so the fade finishes cleanly
    setTimeout(() => {
      document.getElementById('loader-content').style.opacity = '0';
      
      setTimeout(() => {
        window.location.replace('https://arctracker.io/');
      }, 500);
      
    }, 2000);
  </script>
</body>
</html>
